version: "2"

run:
  timeout: 5m
  build-tags:
    - console
    - embed
    - integration

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec
  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*database/sql.DB).Close
    gocritic:
      disabled-checks:
        - exitAfterDefer
  exclusions:
    rules:
      - linters:
          - errcheck
        source: "defer.*\\.(Close|Rollback|Terminate)"
      - linters:
          - errcheck
        path: "_test\\.go$"
      - linters:
          - gosec
        path: "_test\\.go$"
        text: "G104|G101|G306"
      - linters:
          - errcheck
        path: "internal/store/storetest/"
      - linters:
          - gosec
        path: "internal/store/storetest/"
        text: "G104"
    paths:
      - console/frontend
      - widgets/frontend
      - examples

formatters:
  enable:
    - gofmt
