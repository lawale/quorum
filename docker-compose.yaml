services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: makerchecker
      POSTGRES_PASSWORD: makerchecker
      POSTGRES_DB: makerchecker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U makerchecker"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.example.yaml:/etc/maker-checker/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MC_DB_HOST=postgres

volumes:
  pgdata:
