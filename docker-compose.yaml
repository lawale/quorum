services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quorum
      POSTGRES_PASSWORD: quorum
      POSTGRES_DB: quorum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/00-databases.sh:ro
      - ./scripts/init-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quorum"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/postgres:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://quorum:quorum@postgres:5432/quorum?sslmode=disable&search_path=quorum"
      - "up"

  server:
    build:
      context: .
      dockerfile: Dockerfile.all
    ports:
      - "8080:8080"
    volumes:
      - ./config.docker.yaml:/etc/quorum/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Uncomment to use MSSQL instead of Postgres.
  # Set database.driver to "mssql" in config.docker.yaml.
  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SA_PASSWORD: "Quorum_Pass1!"
  #     MSSQL_PID: "Developer"
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - mssqldata:/var/opt/mssql
  #   healthcheck:
  #     test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Quorum_Pass1!" -Q "SELECT 1" -C -b
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # ---- Demo setup (tenants, policies, webhooks — runs before apps) ----
  setup:
    image: curlimages/curl:latest
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./scripts/setup.sh:/setup.sh:ro
    entrypoint: ["sh", "/setup.sh"]
    environment:
      QUORUM_API_URL: http://server:8080
    profiles:
      - seed
      - demo

  # ---- Sample consumer apps (start after setup completes) ----
  banking:
    build: examples/banking
    ports:
      - "3001:3001"
    environment:
      QUORUM_API_URL: http://server:8080
      QUORUM_PUBLIC_URL: http://localhost:8080
      SELF_URL: http://banking:3001
      WEBHOOK_SECRET: banking-webhook-secret
      DATABASE_URL: postgres://quorum:quorum@postgres:5432/banking?sslmode=disable
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    profiles:
      - demo

  expenses:
    build: examples/expenses
    ports:
      - "3002:3002"
    environment:
      QUORUM_API_URL: http://server:8080
      QUORUM_PUBLIC_URL: http://localhost:8080
      SELF_URL: http://expenses:3002
      WEBHOOK_SECRET: expenses-webhook-secret
      DATABASE_URL: postgres://quorum:quorum@postgres:5432/expenses?sslmode=disable
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    profiles:
      - demo

  access-portal:
    build: examples/access-portal
    ports:
      - "3003:3003"
    environment:
      QUORUM_API_URL: http://server:8080
      QUORUM_PUBLIC_URL: http://localhost:8080
      SELF_URL: http://access-portal:3003
      WEBHOOK_SECRET: access-webhook-secret
      DATABASE_URL: postgres://quorum:quorum@postgres:5432/access_portal?sslmode=disable
    depends_on:
      setup:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    profiles:
      - demo

  # ---- Seed data (sample requests — runs after apps are up) ----
  seed:
    image: curlimages/curl:latest
    depends_on:
      banking:
        condition: service_started
      expenses:
        condition: service_started
      access-portal:
        condition: service_started
    volumes:
      - ./scripts/seed.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]
    environment:
      QUORUM_API_URL: http://server:8080
      BANKING_URL: http://banking:3001
      EXPENSES_URL: http://expenses:3002
      ACCESS_PORTAL_URL: http://access-portal:3003
    profiles:
      - seed
      - demo

volumes:
  pgdata:
  # mssqldata:
