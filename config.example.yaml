server:
  host: "0.0.0.0"
  port: 8080

database:
  host: "localhost"
  port: 5432
  user: "makerchecker"
  password: "makerchecker"
  name: "makerchecker"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5

auth:
  mode: "trust"  # trust | verify | custom

  trust:
    user_id_header: "X-User-ID"
    roles_header: "X-User-Roles"

  verify:
    jwks_url: ""
    issuer: ""
    audience: ""
    claims:
      user_id: "sub"
      roles: "roles"

  custom:
    endpoint: ""
    timeout: "5s"

webhook:
  max_retries: 3
  retry_interval: "5s"
  timeout: "10s"

expiry:
  check_interval: "1m"
