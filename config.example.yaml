server:
  host: "0.0.0.0"
  port: 8080

database:
  driver: "postgres"  # postgres | mssql
  host: "localhost"
  port: 5432
  user: "quorum"
  password: "quorum"
  name: "quorum"                 # tables are created in a dedicated 'quorum' schema
  max_open_conns: 25
  max_idle_conns: 5
  params:                      # driver-specific connection params
    sslmode: "disable"
  # mssql example:
  #   encrypt: "disable"
  #   TrustServerCertificate: "true"

auth:
  mode: "trust"  # trust | verify | custom

  trust:
    user_id_header: "X-User-ID"
    roles_header: "X-User-Roles"
    tenant_id_header: "X-Tenant-ID"

  verify:
    jwks_url: ""
    issuer: ""
    audience: ""
    claims:
      user_id: "sub"
      roles: "roles"

  custom:
    endpoint: ""
    timeout: "5s"

webhook:
  max_retries: 3
  retry_interval: "5s"
  timeout: "10s"
  heartbeat: "30s"                 # outbox polling interval (safety net); most deliveries are signal-driven
  outbox_retention: "72h"          # how long to keep delivered outbox entries; 0 = never clean up

expiry:
  check_interval: "1m"

tenant:
  cache_refresh_interval: "1m"  # how often to reload tenant slugs from DB (multi-instance sync)

metrics:
  enabled: false
  path: "/metrics"

console:
  enabled: false                 # requires binary built with -tags console
  jwt_secret: ""                 # optional; auto-generated if empty (sessions lost on restart)
  # secure_cookies: false        # set true in production (behind HTTPS)
  # suggestions:                 # optional: populate role/permission dropdowns in policy editor
  #   roles_url: ""              # external endpoint returning JSON string array of available roles
  #   permissions_url: ""        # external endpoint returning JSON string array of available permissions
  #   auth_header: ""            # header name for upstream auth (e.g., "X-Api-Key", "Authorization")
  #   auth_value: ""             # header value (e.g., "sk-abc123", "Bearer token123")
