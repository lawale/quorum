name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/lawale/quorum

jobs:
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: api
            dockerfile: Dockerfile
            suffix: ""
            context: .
          - variant: console
            dockerfile: Dockerfile.console
            suffix: "-console"
            context: .
          - variant: all
            dockerfile: Dockerfile.all
            suffix: "-all"
            context: .
          - variant: demo-banking
            dockerfile: examples/banking/Dockerfile
            suffix: "-demo-banking"
            context: examples/banking
          - variant: demo-expenses
            dockerfile: examples/expenses/Dockerfile
            suffix: "-demo-expenses"
            context: examples/expenses
          - variant: demo-access-portal
            dockerfile: examples/access-portal/Dockerfile
            suffix: "-demo-access-portal"
            context: examples/access-portal
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_BASE }}${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  npm:
    name: Publish @oluwavader/quorum-embed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    defaults:
      run:
        working-directory: widgets/frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: widgets/frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - run: npm publish --access public --provenance

  trivy:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      security-events: write
    strategy:
      matrix:
        image:
          - ""
          - "-console"
          - "-all"
    steps:
      - uses: actions/checkout@v6

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}${{ matrix.image }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.image || 'api' }}.sarif

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image || 'api' }}.sarif
          category: trivy-${{ matrix.image || 'api' }}
