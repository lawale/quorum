name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            console/frontend/package-lock.json
            widgets/frontend/package-lock.json
      - run: cd console/frontend && npm ci && npm run build
      - run: cd widgets/frontend && npm ci && npm run build
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  integration-postgres:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags=integration -race -count=1 -timeout=10m ./internal/store/postgres/

  integration-mssql:
    name: Integration (MSSQL)
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -tags=integration -race -count=1 -timeout=10m ./internal/store/mssql/

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./cmd/server

  build-console:
    name: Build (Console)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/frontend/package-lock.json
      - run: cd console/frontend && npm ci && npm run build
      - run: go build -tags console ./cmd/server

  build-embed:
    name: Build (Embed Widgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widgets/frontend/package-lock.json
      - run: cd widgets/frontend && npm ci && npm run build
      - run: go build -tags embed ./cmd/server
